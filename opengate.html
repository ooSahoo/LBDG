document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er; font-family:'EB Garamond',serif; font-size:11px; letter-spacing:5px; text-transform:uppercase; color:#9fb4ff;\">Stringa Alfa<\u002Fdiv>\n        <div style=\"height:18px;\"><\u002Fdiv>\n        <p style=\"margin:0 0 14px; font-size:clamp(15px,2.2vw,18px); line-height:1.7; color:#d4ddf5; text-wrap:pretty;\">Prendi il risultato naturale di un <strong style=\"color:#4d6fe3; font-weight:600;\">Successo Critico<\u002Fstrong>.<\u002Fp>\n        <p style=\"margin:0 0 14px; font-size:clamp(15px,2.2vw,18px); line-height:1.7; color:#d4ddf5; text-wrap:pretty;\">Aggiungi il tratto razziale dell'<strong style=\"color:#4d6fe3; font-weight:600;\">Umano Standard<\u002Fstrong>.<\u002Fp>\n        <p style=\"margin:0 0 14px; font-size:clamp(15px,2.2vw,18px); line-height:1.7; color:#d4ddf5; text-wrap:pretty;\">Unisci il risultato al numero del mese in cui il <strong style=\"color:#4d6fe3; font-weight:600;\">Leone consegna il cielo alla Vergine<\u002Fstrong>.<\u002Fp>\n        <p style=\"margin:0; font-size:clamp(15px,2.2vw,18px); line-height:1.7; color:#d4ddf5; text-wrap:pretty;\">Chiudi la stringa con l'anno in cui la <strong style=\"color:#4d6fe3; font-weight:600;\">Quinta Era<\u002Fstrong> compie la sua trentesima primavera.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SECOND DIE ===== -->\n    <sc-if value=\"{{ reveal1 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:clamp(48px,8vw,76px);\"><\u002Fdiv>\n      <div style=\"font-family:'EB Garamond',serif; font-size:clamp(16px,2.3vw,19px); font-style:italic; color:#a9b3cf;\">Lancia un altro dado.<\u002Fdiv>\n      <div style=\"height:26px;\"><\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:16px;\">\n        <div sc-camel-on-click=\"{{ roll2 }}\" title=\"Lancia il dado\" style=\"{{ die2Wrap }}\">\n          <div style=\"{{ die2Anim }}\">\n            <svg width=\"150\" height=\"150\" sc-camel-view-box=\"0 0 100 100\" fill=\"none\" style=\"display:block;\">\n              <polygon points=\"50,4 89.8,27 89.8,73 50,96 10.2,73 10.2,27\" fill=\"rgba(77,111,227,0.06)\" stroke=\"#4d6fe3\" stroke-width=\"2\"><\u002Fpolygon>\n              <polygon points=\"50,26 72,62 28,62\" fill=\"rgba(200,16,46,0.14)\" stroke=\"#4d6fe3\" stroke-width=\"1.4\"><\u002Fpolygon>\n              <g stroke=\"#4d6fe3\" stroke-width=\"1\" opacity=\"0.85\">\n                <path d=\"M50 4 L50 26\"><\u002Fpath><path d=\"M89.8 27 L72 62\"><\u002Fpath><path d=\"M10.2 27 L28 62\"><\u002Fpath>\n                <path d=\"M89.8 73 L72 62\"><\u002Fpath><path d=\"M10.2 73 L28 62\"><\u002Fpath><path d=\"M50 96 L50 62\"><\u002Fpath>\n              <\u002Fg>\n            <\u002Fsvg>\n            <div style=\"{{ die2FaceStyle }}\">{{ die2Face }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- SECOND reveal -->\n    <sc-if value=\"{{ reveal2 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin:34px auto 0; max-width:560px; text-align:left; background:rgba(12,16,34,0.62); border:1px solid rgba(77,111,227,0.35); border-radius:10px; padding:clamp(24px,5vw,36px); box-shadow:0 24px 50px rgba(0,0,0,0.45); animation:vtFadeUp .7s ease forwards;\">\n        <div style=\"text-align:center; font-family:'EB Garamond',serif; font-size:11px; letter-spacing:5px; text-transform:uppercase; color:#9fb4ff;\">Seconda Stringa<\u002Fdiv>\n        <div style=\"height:18px;\"><\u002Fdiv>\n        <p style=\"margin:0 0 14px; font-size:clamp(15px,2.2vw,18px); line-height:1.7; color:#d4ddf5; text-wrap:pretty;\">Riparti dalla <strong style=\"color:#4d6fe3; font-weight:600;\">Stringa Alfa<\u002Fstrong>.<\u002Fp>\n        <p style=\"margin:0 0 14px; font-size:clamp(15px,2.2vw,18px); line-height:1.7; color:#d4ddf5; text-wrap:pretty;\">Fai compiere al giorno del destino <strong style=\"color:#4d6fe3; font-weight:600;\">tre passi in avanti<\u002Fstrong>.<\u002Fp>\n        <p style=\"margin:0; font-size:clamp(15px,2.2vw,18px); line-height:1.7; color:#d4ddf5; text-wrap:pretty;\">Tutto il resto rimane immutato.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- VERIFY BUTTON -->\n    <sc-if value=\"{{ reveal2 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:clamp(48px,8vw,72px);\"><\u002Fdiv>\n      <button sc-camel-on-click=\"{{ openModal }}\" style=\"cursor:pointer; border:none; border-radius:999px; padding:17px 46px; font-family:'Grenze Gotisch',serif; font-weight:600; font-size:20px; letter-spacing:2px; color:#ffffff; background:linear-gradient(#a01120,#7a0e18); box-shadow:0 12px 26px rgba(0,0,0,0.45);\" style-hover=\"background:linear-gradient(#c01327,#8f101c); transform:translateY(-2px);\">Verifica intervalli<\u002Fbutton>\n    <\u002Fsc-if>\n\n    <!-- SIGNATURE -->\n    <div style=\"height:clamp(64px,10vw,96px);\"><\u002Fdiv>\n    <svg width=\"300\" height=\"30\" sc-camel-view-box=\"0 0 300 30\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:block; margin:0 auto;\">\n      <g stroke=\"#c8102e\" stroke-width=\"1.3\" stroke-linecap=\"round\" fill=\"none\">\n        <path d=\"M150 15 C 131 15 129 7 112 7 C 98 7 96 15 81 15 C 68 15 66 8 53 8 C 44 8 39 12 33 15\"><\u002Fpath>\n        <path d=\"M33 15 C 22 15 16 10 18 4.5 C 19.2 1 24.5 1.4 25.5 4.6 C 26.4 7.6 22 9 19.5 7\"><\u002Fpath>\n        <path d=\"M112 7 C 110 2.5 113 -1 118 1.5\"><\u002Fpath>\n        <path d=\"M53 8 C 51 3.5 54 0 59 2.5\"><\u002Fpath>\n      <\u002Fg>\n      <g fill=\"#c8102e\" stroke=\"none\"><path d=\"M112 7 C 106 6 103 2 105 -0.5 C 108 1 111 3.5 112 7 Z\"><\u002Fpath><path d=\"M53 8 C 47 7 44 3 46 0.5 C 49 2 52 4.5 53 8 Z\"><\u002Fpath><circle cx=\"150\" cy=\"15\" r=\"3\"><\u002Fcircle><\u002Fg>\n      <g stroke=\"#c8102e\" stroke-width=\"1.3\" stroke-linecap=\"round\" fill=\"none\" transform=\"translate(300,0) scale(-1,1)\">\n        <path d=\"M150 15 C 131 15 129 7 112 7 C 98 7 96 15 81 15 C 68 15 66 8 53 8 C 44 8 39 12 33 15\"><\u002Fpath>\n        <path d=\"M33 15 C 22 15 16 10 18 4.5 C 19.2 1 24.5 1.4 25.5 4.6 C 26.4 7.6 22 9 19.5 7\"><\u002Fpath>\n        <path d=\"M112 7 C 110 2.5 113 -1 118 1.5\"><\u002Fpath>\n        <path d=\"M53 8 C 51 3.5 54 0 59 2.5\"><\u002Fpath>\n      <\u002Fg>\n      <g fill=\"#c8102e\" stroke=\"none\" transform=\"translate(300,0) scale(-1,1)\"><path d=\"M112 7 C 106 6 103 2 105 -0.5 C 108 1 111 3.5 112 7 Z\"><\u002Fpath><path d=\"M53 8 C 47 7 44 3 46 0.5 C 49 2 52 4.5 53 8 Z\"><\u002Fpath><\u002Fg>\n    <\u002Fsvg>\n    <div style=\"height:18px;\"><\u002Fdiv>\n    <div style=\"font-family:'EB Garamond',serif; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:#8792b8;\">Il tuo<\u002Fdiv>\n    <div style=\"height:8px;\"><\u002Fdiv>\n    <div style=\"font-family:'Grenze Gotisch',serif; font-weight:600; font-size:clamp(26px,7vw,36px); color:#4d6fe3;\">Birthday Master<\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ===== MODAL ===== -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeModal }}\" style=\"position:fixed; inset:0; z-index:50; background:rgba(4,6,15,0.82); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box;\">\n      <div sc-camel-on-click=\"{{ stop }}\" style=\"position:relative; width:100%; max-width:480px; background:#0d1226; background-image:linear-gradient(#121834,#0a0f22); border:1px solid rgba(77,111,227,0.4); border-radius:14px; padding:clamp(28px,6vw,44px); box-shadow:0 40px 80px rgba(0,0,0,0.6); font-family:'EB Garamond',serif; animation:vtPop .4s ease forwards;\">\n\n        <!-- FORM state -->\n        <sc-if value=\"{{ stateForm }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"text-align:center;\">\n            <div style=\"font-family:'EB Garamond',serif; font-size:11px; letter-spacing:5px; text-transform:uppercase; color:#9fb4ff;\">Varco Temporale<\u002Fdiv>\n            <div style=\"height:12px;\"><\u002Fdiv>\n            <div style=\"font-family:'Grenze Gotisch',serif; font-weight:600; font-size:clamp(26px,6vw,32px); color:#f2f5ff;\">Indica l'intervallo<\u002Fdiv>\n            <div style=\"height:8px;\"><\u002Fdiv>\n            <p style=\"margin:0; font-size:15px; line-height:1.6; color:#a9b3cf;\">Inserisci le due date che aprono il varco.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"height:28px;\"><\u002Fdiv>\n          <label style=\"display:block; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:#8f9bbd; margin-bottom:8px;\">Prima data<\u002Flabel>\n          <input type=\"date\" value=\"{{ d1 }}\" sc-camel-on-input=\"{{ setD1 }}\" style=\"width:100%; box-sizing:border-box; padding:13px 15px; border-radius:8px; border:1px solid rgba(77,111,227,0.4); background:rgba(6,9,20,0.7); color:#f2f5ff; font-family:'EB Garamond',serif; font-size:17px; color-scheme:dark;\">\n          <div style=\"height:18px;\"><\u002Fdiv>\n          <label style=\"display:block; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:#8f9bbd; margin-bottom:8px;\">Seconda data<\u002Flabel>\n          <input type=\"date\" value=\"{{ d2 }}\" sc-camel-on-input=\"{{ setD2 }}\" style=\"width:100%; box-sizing:border-box; padding:13px 15px; border-radius:8px; border:1px solid rgba(77,111,227,0.4); background:rgba(6,9,20,0.7); color:#f2f5ff; font-family:'EB Garamond',serif; font-size:17px; color-scheme:dark;\">\n          <div style=\"height:28px;\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ verify }}\" style=\"width:100%; cursor:pointer; border:none; border-radius:999px; padding:15px; font-family:'Grenze Gotisch',serif; font-weight:600; font-size:19px; letter-spacing:2px; color:#ffffff; background:linear-gradient(#a01120,#7a0e18); box-shadow:0 10px 22px rgba(0,0,0,0.4);\" style-hover=\"background:linear-gradient(#c01327,#8f101c);\">Verifica<\u002Fbutton>\n          <div style=\"height:14px;\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ closeModal }}\" style=\"width:100%; cursor:pointer; border:1px solid rgba(160,170,200,0.25); border-radius:999px; padding:11px; background:transparent; color:#8f9bbd; font-family:'EB Garamond',serif; font-size:15px;\">Annulla<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <!-- WRONG state (no hint) -->\n        <sc-if value=\"{{ stateWrong }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;\">\n            <div style=\"font-family:'Grenze Gotisch',serif; font-weight:600; font-size:clamp(24px,5.5vw,30px); color:#e2607a;\">L'intervallo non regge.<\u002Fdiv>\n            <div style=\"height:14px;\"><\u002Fdiv>\n            <p style=\"margin:0; font-size:16px; line-height:1.7; color:#ccd6f0; text-wrap:pretty;\">Le date che hai indicato non aprono il varco, avventuriero. La logica e l'arguzia richiedono un'altra riflessione.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"height:28px;\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ retry }}\" style=\"width:100%; cursor:pointer; border:none; border-radius:999px; padding:15px; font-family:'Grenze Gotisch',serif; font-weight:600; font-size:19px; letter-spacing:2px; color:#ffffff; background:linear-gradient(#a01120,#7a0e18); box-shadow:0 10px 22px rgba(0,0,0,0.4);\" style-hover=\"background:linear-gradient(#c01327,#8f101c);\">Ritenta<\u002Fbutton>\n          <div style=\"height:14px;\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ askHint }}\" style=\"width:100%; cursor:pointer; border:1px solid rgba(77,111,227,0.5); border-radius:999px; padding:13px; background:transparent; color:#4d6fe3; font-family:'EB Garamond',serif; font-style:italic; font-size:15.5px; line-height:1.4;\">Scambia il mio punto Ispirazione per un indizio<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <!-- HINT state -->\n        <sc-if value=\"{{ stateHint }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;\">\n            <div style=\"font-family:'EB Garamond',serif; font-size:11px; letter-spacing:5px; text-transform:uppercase; color:#9fb4ff;\">Punto Ispirazione speso<\u002Fdiv>\n            <div style=\"height:14px;\"><\u002Fdiv>\n            <div style=\"font-family:'Grenze Gotisch',serif; font-weight:600; font-size:clamp(24px,5.5vw,30px); color:#f2f5ff;\">Le date corrette<\u002Fdiv>\n            <div style=\"height:20px;\"><\u002Fdiv>\n            <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap;\">\n              <div style=\"border:1px solid rgba(77,111,227,0.4); border-radius:10px; padding:16px 22px; background:rgba(6,9,20,0.6);\">\n                <div style=\"font-family:'Grenze Gotisch',serif; font-size:26px; color:#4d6fe3;\">21 · 08 · 2026<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border:1px solid rgba(77,111,227,0.4); border-radius:10px; padding:16px 22px; background:rgba(6,9,20,0.6);\">\n                <div style=\"font-family:'Grenze Gotisch',serif; font-size:26px; color:#4d6fe3;\">24 · 08 · 2026<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:14px;\"><\u002Fdiv>\n            <p style=\"margin:0; font-size:14px; font-style:italic; color:#8f9bbd;\">L'intervallo del tuo destino va dal 21 al 24 agosto 2026.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"height:26px;\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ retry }}\" style=\"width:100%; cursor:pointer; border:none; border-radius:999px; padding:14px; font-family:'Grenze Gotisch',serif; font-weight:600; font-size:18px; letter-spacing:2px; color:#ffffff; background:linear-gradient(#a01120,#7a0e18); box-shadow:0 10px 22px rgba(0,0,0,0.4);\" style-hover=\"background:linear-gradient(#c01327,#8f101c);\">Inserisci le date<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <!-- SUCCESS state -->\n        <sc-if value=\"{{ stateWin }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;\">\n            <svg width=\"60\" height=\"60\" sc-camel-view-box=\"0 0 100 100\" style=\"display:inline-block;\"><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#4d6fe3\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"50\" cy=\"50\" r=\"30\" fill=\"none\" stroke=\"#c8102e\" stroke-width=\"2.4\"><\u002Fcircle><path d=\"M38 51 L47 60 L64 40\" fill=\"none\" stroke=\"#4d6fe3\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <div style=\"height:16px;\"><\u002Fdiv>\n            <div style=\"font-family:'Grenze Gotisch',serif; font-weight:600; font-size:clamp(24px,5.5vw,32px); line-height:1.1; color:#f2f5ff;\">Il varco è aperto.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:22px;\"><\u002Fdiv>\n          <p style=\"margin:0 0 15px; font-size:16px; line-height:1.72; color:#d4ddf5; text-wrap:pretty;\">Complimenti avventuriero, hai aperto il varco temporale della tua missione.<\u002Fp>\n          <p style=\"margin:0 0 15px; font-size:15.5px; line-height:1.72; color:#a9b3cf; text-wrap:pretty;\">Durante l'intero intervallo sarai precettato: non potrai assumere altri incarichi, fissare appuntamenti o promettere la tua presenza altrove.<\u002Fp>\n          <p style=\"margin:0 0 15px; font-size:15.5px; line-height:1.72; color:#a9b3cf; text-wrap:pretty;\">La natura dell'impresa non consente inoltre la presenza del tuo compagno felino. Dovrai quindi affidarlo per tempo a una persona degna della tua fiducia, assicurandoti che riceva cibo, cure e la consueta dose di venerazione.<\u002Fp>\n          <p style=\"margin:0; font-size:15.5px; line-height:1.72; color:#a9b3cf; text-wrap:pretty;\">Non saranno accettati incarichi sovrapposti, convocazioni alternative o mansioni salariate con precedenza.<\u002Fp>\n          <div style=\"height:26px;\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ closeModal }}\" style=\"width:100%; cursor:pointer; border:none; border-radius:999px; padding:14px; font-family:'Grenze Gotisch',serif; font-weight:600; font-size:18px; letter-spacing:2px; color:#ffffff; background:linear-gradient(#a01120,#7a0e18); box-shadow:0 10px 22px rgba(0,0,0,0.4);\" style-hover=\"background:linear-gradient(#c01327,#8f101c);\">Chiudi il varco<\u002Fbutton>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      stars: [], embers: [],\n      rolling1: false, reveal1: false, face1: 20,\n      rolling2: false, reveal2: false, face2: 20,\n      modalOpen: false, phase: 'form', d1: '', d2: ''\n    };\n  }\n  componentDidMount() {\n    const rnd = (a, b) => a + Math.random() * (b - a);\n    const stars = Array.from({ length: 70 }, (_, i) => ({\n      id: i, left: rnd(0, 100).toFixed(2), top: rnd(0, 100).toFixed(2),\n      size: rnd(1, 2.6).toFixed(1), delay: rnd(0, 5).toFixed(2), dur: rnd(2.5, 6).toFixed(2)\n    }));\n    const embers = Array.from({ length: 14 }, (_, i) => ({\n      id: i, left: rnd(0, 100).toFixed(2), size: rnd(2, 4).toFixed(1),\n      delay: rnd(0, 14).toFixed(2), dur: rnd(14, 24).toFixed(2)\n    }));\n    this.setState({ stars, embers });\n  }\n  componentWillUnmount() { clearInterval(this._i1); clearInterval(this._i2); clearTimeout(this._t1); clearTimeout(this._t2); }\n\n  rollDie(n) {\n    const rollingKey = 'rolling' + n, revealKey = 'reveal' + n, faceKey = 'face' + n, iKey = '_i' + n, tKey = '_t' + n;\n    if (this.state[rollingKey] || this.state[revealKey]) return;\n    const result = n === 2 ? 3 : 20;\n    this.setState({ [rollingKey]: true });\n    this[iKey] = setInterval(() => {\n      this.setState({ [faceKey]: 1 + Math.floor(Math.random() * 20) });\n    }, 70);\n    this[tKey] = setTimeout(() => {\n      clearInterval(this[iKey]);\n      this.setState({ [rollingKey]: false, [revealKey]: true, [faceKey]: result });\n    }, 950);\n  }\n\n  openModal() { this.setState({ modalOpen: true, phase: 'form' }); }\n  closeModal() { this.setState({ modalOpen: false }); }\n  retry() { this.setState({ phase: 'form' }); }\n  askHint() { this.setState({ phase: 'hint' }); }\n\n  verify() {\n    const { d1, d2 } = this.state;\n    const ok = (a, b) => a === '2026-08-21' && b === '2026-08-24';\n    const correct = ok(d1, d2) || ok(d2, d1);\n    this.setState({ phase: correct ? 'win' : 'wrong' });\n  }\n\n  dieWrap(rolling) {\n    return `position:relative; width:150px; height:150px; cursor:${rolling ? 'default' : 'pointer'}; filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5)) drop-shadow(0 0 16px rgba(77,111,227,0.28)); transition:transform .2s ease;`;\n  }\n  dieAnim(rolling) {\n    return `position:relative; width:150px; height:150px; ${rolling ? 'animation:vtDiceShake 0.9s ease-in-out;' : ''}`;\n  }\n  faceStyle() {\n    return \"position:absolute; left:0; top:46%; width:100%; transform:translateY(-50%); text-align:center; font-family:'Grenze Gotisch',serif; font-weight:700; font-size:34px; color:#f2f5ff; text-shadow:0 2px 6px rgba(0,0,0,0.6); pointer-events:none;\";\n  }\n  hintStyle(rolling, reveal) {\n    const show = !rolling && !reveal;\n    return `font-family:'EB Garamond',serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#8f9bbd; opacity:${show ? 1 : 0}; transition:opacity .3s;`;\n  }\n\n  renderVals() {\n    const s = this.state;\n    return {\n      stars: s.stars, embers: s.embers,\n      roll1: () => this.rollDie(1), roll2: () => this.rollDie(2),\n      reveal1: s.reveal1, reveal2: s.reveal2,\n      die1Face: s.face1, die2Face: s.face2,\n      die1Wrap: this.dieWrap(s.rolling1), die2Wrap: this.dieWrap(s.rolling2),\n      die1Anim: this.dieAnim(s.rolling1), die2Anim: this.dieAnim(s.rolling2),\n      die1FaceStyle: this.faceStyle(), die2FaceStyle: this.faceStyle(),\n      die1HintStyle: this.hintStyle(s.rolling1, s.reveal1),\n      die2HintStyle: this.hintStyle(s.rolling2, s.reveal2),\n      modalOpen: s.modalOpen,\n      openModal: () => this.openModal(), closeModal: () => this.closeModal(),\n      stop: (e) => e.stopPropagation(),\n      d1: s.d1, d2: s.d2,\n      setD1: (e) => this.setState({ d1: e.target.value }),\n      setD2: (e) => this.setState({ d2: e.target.value }),\n      verify: () => this.verify(), retry: () => this.retry(), askHint: () => this.askHint(),\n      stateForm: s.phase === 'form', stateWrong: s.phase === 'wrong',\n      stateHint: s.phase === 'hint', stateWin: s.phase === 'win'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
